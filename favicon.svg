<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="B1C3 Clock Favicon">
  <defs>
    <linearGradient id="ferm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#7ec850"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#0e0f11"/>

  <!-- Outer ring: sleeping arc (dark) + waking arc (lit) -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#1a1d24" stroke-width="7"/>
  <path d="M 32 8 A 24 24 0 1 1 11.216 44" fill="none" stroke="#2f343d" stroke-width="7"/>

  <!-- Middle ring: recovery structure -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#2a2d35" stroke-width="5"/>

  <!-- Center fermentation phase gradient -->
  <circle cx="32" cy="32" r="10" fill="url(#ferm)"/>

  <!-- Position marker -->
  <circle cx="48" cy="24" r="3" fill="#87ceeb"/>
</svg>
