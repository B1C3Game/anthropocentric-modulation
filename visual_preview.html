<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B1C3 Clock — Visual Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0e0f11;
      color: #c8cfd8;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 32px 16px;
      gap: 24px;
    }
    h1 { font-size: 1.1rem; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.5; }
    #clock-wrap { position: relative; width: 420px; height: 420px; }
    svg { overflow: visible; }

    /* Controls */
    #controls {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      justify-content: center;
    }
    label { font-size: 0.78rem; opacity: 0.6; }
    input[type=range] { width: 160px; accent-color: #7ec850; }
    #refresh-btn {
      background: none;
      border: 1px solid rgba(200,207,216,0.2);
      color: #c8cfd8;
      border-radius: 6px;
      padding: 6px 18px;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #refresh-btn:hover { border-color: #7ec850; color: #7ec850; }
      font-size: 1.6rem; font-weight: 700; letter-spacing: 0.05em;
      min-width: 120px; text-align: center;
    }
    #info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px; width: 420px;
    }
    .card {
      background: #16181c;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .card-label { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.45; }
    .card-value { font-size: 1.15rem; font-weight: 600; }
    .card-sub   { font-size: 0.75rem; opacity: 0.5; }
  </style>
</head>
<body>
  <h1>B1C3 Clock</h1>

  <!-- Slider controls for exploring any time/fermentation state -->
  <div id="controls">
    <label>Hour (0–23)
      <input id="sliderHour" type="range" min="0" max="23" value="17" />
      <span id="valHour">17</span>
    </label>
    <label>Minute (0–59)
      <input id="sliderMin" type="range" min="0" max="59" value="27" />
      <span id="valMin">27</span>
    </label>
    <label>Ferm. day (1–7)
      <input id="sliderFerm" type="range" min="1" max="7" value="4" />
      <span id="valFerm">3</span>
    </label>
  </div>
  <button id="refresh-btn">&#x21BB; Now</button>
  <div id="state-label">ACTIVE</div>

  <div id="clock-wrap">
    <svg id="svg" width="420" height="420" viewBox="-210 -210 420 420"></svg>
  </div>

  <div id="info-grid">
    <div class="card">
      <div class="card-label">Day Cycle</div>
      <div class="card-value" id="info-bout">—</div>
      <div class="card-sub" id="info-arc">—</div>
    </div>
    <div class="card">
      <div class="card-label">Recovery</div>
      <div class="card-value" id="info-cycle">—</div>
      <div class="card-sub" id="info-state">—</div>
    </div>
    <div class="card">
      <div class="card-label">Fermentation</div>
      <div class="card-value" id="info-phase">—</div>
      <div class="card-sub" id="info-ferm-day">—</div>
    </div>
  </div>

  <script>
  // -------------------------------------------------------------------------
  // Engine (mirrors b1c3_clock_engine.py exactly)
  // -------------------------------------------------------------------------
  const FERMENTATION_PHASES = [
    "Sealed", "Bubbling", "Peak", "Calming", "Settled", "Ready", "Peaked"
  ];
  const SLEEPING_BOUTS = new Set([0, 1]);
  const SKY_BLUE   = [135, 206, 235];
  const GRASS_GREEN = [126, 200, 80];

  function lerpColor(c1, c2, t) {
    t = Math.max(0, Math.min(t, 1));
    const r = Math.round(c1[0] + (c2[0]-c1[0])*t);
    const g = Math.round(c1[1] + (c2[1]-c1[1])*t);
    const b = Math.round(c1[2] + (c2[2]-c1[2])*t);
    return `rgb(${r},${g},${b})`;
  }

  function hexColor(c1, c2, t) {
    t = Math.max(0, Math.min(t, 1));
    const r = Math.round(c1[0] + (c2[0]-c1[0])*t);
    const g = Math.round(c1[1] + (c2[1]-c1[1])*t);
    const b = Math.round(c1[2] + (c2[2]-c1[2])*t);
    return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
  }

  function getClockState(hour, minute, fermDays) {
    const boutIndex     = Math.floor(hour / 4);
    const minInBout     = (hour % 4) * 60 + minute;
    const cycleIndex    = Math.floor(minInBout / 30);
    const isSleeping    = SLEEPING_BOUTS.has(boutIndex);
    const inRecovery    = cycleIndex === 7;
    const days          = Math.max(0, Math.min(fermDays - 1, 6));  // convert 1-based to 0-based
    const t             = days / 6;
    const baseColor     = hexColor(SKY_BLUE, GRASS_GREEN, t);
    return {
      boutIndex, boutNumber: boutIndex + 1,
      isSleeping, isWaking: !isSleeping,
      cycleIndex, cycleNumber: cycleIndex + 1,
      inRecovery, isActive: !inRecovery,
      stateLabel: inRecovery ? "RECOVERY" : "ACTIVE",
      phaseName: FERMENTATION_PHASES[days],
      phaseIndex: days,
      fermDays: days,
      baseColor,
      isMuted: inRecovery,
      t,
    };
  }

  // -------------------------------------------------------------------------
  // SVG Renderer
  // -------------------------------------------------------------------------
  const TOTAL_BOUTS    = 6;
  const TOTAL_CYCLES   = 8;
  const TOTAL_PHASES   = 7;

  const R_OUTER_OUT = 190;
  const R_OUTER_IN  = 140;
  const R_MID_OUT   = 128;
  const R_MID_IN    = 80;
  const R_INNER     = 68;

  const GAP_DEG = 2; // visual gap between segments

  function polarToXY(angleDeg, r) {
    const rad = (angleDeg - 90) * Math.PI / 180;
    return [r * Math.cos(rad), r * Math.sin(rad)];
  }

  function arcPath(startDeg, endDeg, outerR, innerR) {
    const s1 = polarToXY(startDeg, outerR);
    const e1 = polarToXY(endDeg, outerR);
    const s2 = polarToXY(endDeg, innerR);
    const e2 = polarToXY(startDeg, innerR);
    const large = (endDeg - startDeg) > 180 ? 1 : 0;
    return [
      `M ${s1[0]} ${s1[1]}`,
      `A ${outerR} ${outerR} 0 ${large} 1 ${e1[0]} ${e1[1]}`,
      `L ${s2[0]} ${s2[1]}`,
      `A ${innerR} ${innerR} 0 ${large} 0 ${e2[0]} ${e2[1]}`,
      'Z'
    ].join(' ');
  }

  function svgEl(tag, attrs, parent) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    if (parent) parent.appendChild(el);
    return el;
  }

  function render(hour, minute, fermDays) {
    const state = getClockState(hour, minute, fermDays);
    const svg   = document.getElementById('svg');
    svg.innerHTML = '';

    const baseColor   = state.baseColor;
    const dimColor    = '#2a2d35';
    const sleepColor  = '#1a1d24';
    const glowColor   = state.baseColor;
    const mutedColor  = mixWithBackground(state.baseColor, 0.35);

    // Defs (glow filter)
    const defs = svgEl('defs', {}, svg);
    const filt = svgEl('filter', { id: 'glow', x: '-50%', y: '-50%', width: '200%', height: '200%' }, defs);
    const blur = svgEl('feGaussianBlur', { stdDeviation: '4', result: 'blur' }, filt);
    const merge = svgEl('feMerge', {}, filt);
    svgEl('feMergeNode', { in: 'blur' }, merge);
    svgEl('feMergeNode', { in: 'SourceGraphic' }, merge);

    // ---- Ring 1: Day Cycle (outer) ----------------------------------------
    const boutDeg = 360 / TOTAL_BOUTS;
    for (let i = 0; i < TOTAL_BOUTS; i++) {
      const startDeg = i * boutDeg + GAP_DEG / 2;
      const endDeg   = (i + 1) * boutDeg - GAP_DEG / 2;
      const isCurrent  = i === state.boutIndex;
      const isSleepSeg = SLEEPING_BOUTS.has(i);

      let fill;
      if (isCurrent)       fill = glowColor;
      else if (isSleepSeg) fill = sleepColor;
      else                 fill = dimColor;

      const opacity = isCurrent ? '1' : isSleepSeg ? '0.6' : '0.35';
      const path = svgEl('path', {
        d: arcPath(startDeg, endDeg, R_OUTER_OUT, R_OUTER_IN),
        fill, opacity,
        filter: isCurrent ? 'url(#glow)' : '',
      }, svg);
    }

    // ---- Ring 2: Recovery cycles (middle) ---------------------------------
    const cycleDeg = 360 / TOTAL_CYCLES;
    for (let i = 0; i < TOTAL_CYCLES; i++) {
      const startDeg  = i * cycleDeg + GAP_DEG / 2;
      const endDeg    = (i + 1) * cycleDeg - GAP_DEG / 2;
      const isCurrent = i === state.cycleIndex;
      const isLastRec = i === 7;

      let fill;
      if (isCurrent && state.inRecovery)  fill = mutedColor;
      else if (isCurrent)                 fill = baseColor;
      else if (isLastRec)                 fill = '#242830';
      else                                fill = dimColor;

      const opacity = isCurrent ? '1' : '0.4';
      svgEl('path', {
        d: arcPath(startDeg, endDeg, R_MID_OUT, R_MID_IN),
        fill, opacity,
        filter: isCurrent ? 'url(#glow)' : '',
      }, svg);
    }

    // ---- Ring 3: Fermentation (inner circle) ------------------------------
    const phaseDeg = 360 / TOTAL_PHASES;
    for (let i = 0; i < TOTAL_PHASES; i++) {
      const startDeg  = i * phaseDeg + GAP_DEG / 2;
      const endDeg    = (i + 1) * phaseDeg - GAP_DEG / 2;
      const isCurrent = i === state.phaseIndex;
      const t         = i / 6;
      const segColor  = hexColor(SKY_BLUE, GRASS_GREEN, t);
      const opacity   = isCurrent ? '1' : '0.22';

      svgEl('path', {
        d: arcPath(startDeg, endDeg, R_INNER, 0),
        fill: segColor, opacity,
        filter: isCurrent ? 'url(#glow)' : '',
      }, svg);
    }

    // Centre dot
    svgEl('circle', { cx: 0, cy: 0, r: 6, fill: baseColor, opacity: '0.9', filter: 'url(#glow)' }, svg);

    // ---- Update info cards ------------------------------------------------
    document.getElementById('state-label').textContent = state.stateLabel;
    document.getElementById('state-label').style.color = state.inRecovery ? mutedColor : baseColor;

    document.getElementById('info-bout').textContent  = `Bout ${state.boutNumber} / ${TOTAL_BOUTS}`;
    document.getElementById('info-arc').textContent   = state.isSleeping ? 'Sleeping arc' : 'Waking arc';
    document.getElementById('info-cycle').textContent = `Cycle ${state.cycleNumber} / ${TOTAL_CYCLES}`;
    document.getElementById('info-state').textContent = state.inRecovery ? 'Recovery segment' : 'Active segment';
    document.getElementById('info-phase').textContent = state.phaseName;
    document.getElementById('info-ferm-day').textContent = `Day ${state.fermDays} of ${TOTAL_PHASES}`;
  }

  function mixWithBackground(hex, t) {
    // Blend hex colour toward background #0e0f11 by factor t
    const bg = [14, 15, 17];
    const r  = parseInt(hex.slice(1,3),16);
    const g  = parseInt(hex.slice(3,5),16);
    const b  = parseInt(hex.slice(5,7),16);
    const nr = Math.round(r + (bg[0]-r)*t);
    const ng = Math.round(g + (bg[1]-g)*t);
    const nb = Math.round(b + (bg[2]-b)*t);
    return '#' + [nr,ng,nb].map(v=>v.toString(16).padStart(2,'0')).join('');
  }

  // ---- Slider wiring -------------------------------------------------------
  function getValues() {
    return {
      hour: +document.getElementById('sliderHour').value,
      min:  +document.getElementById('sliderMin').value,
      ferm: +document.getElementById('sliderFerm').value,
    };
  }

  ['sliderHour','sliderMin','sliderFerm'].forEach(id => {
    const slider = document.getElementById(id);
    const span   = document.getElementById(id.replace('slider','val').replace('Hour','Hour').replace('Min','Min').replace('Ferm','Ferm'));
    slider.addEventListener('input', () => {
      span.textContent = slider.value;
      const v = getValues();
      render(v.hour, v.min, v.ferm);
    });
  });

  // Fix span IDs — initial values set dynamically below

  function refreshToNow() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const f = ((now.getDay() + 6) % 7) + 1;
    document.getElementById('sliderHour').value = h;
    document.getElementById('valHour').textContent = h;
    document.getElementById('sliderMin').value = m;
    document.getElementById('valMin').textContent = m;
    document.getElementById('sliderFerm').value = f;
    document.getElementById('valFerm').textContent = f;
    render(h, m, f);
  }

  document.getElementById('refresh-btn').addEventListener('click', refreshToNow);

  // Default fermentation to current weekday (Mon=0 … Sun=6)
  const todayFerm = ((new Date().getDay() + 6) % 7) + 1;  // Mon=1 … Sun=7
  document.getElementById('sliderFerm').value = todayFerm;
  document.getElementById('valFerm').textContent = todayFerm;

  // Initial render using current local time
  const _now = new Date();
  document.getElementById('sliderHour').value = _now.getHours();
  document.getElementById('valHour').textContent = _now.getHours();
  document.getElementById('sliderMin').value = _now.getMinutes();
  document.getElementById('valMin').textContent = _now.getMinutes();

  render(_now.getHours(), _now.getMinutes(), todayFerm);
  </script>
</body>
</html>
